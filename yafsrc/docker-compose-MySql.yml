networks:
  dev:
    driver: bridge

services:
  yafnet:
    image: yafnet/yafnet:latest-mysql
    depends_on:
      mariadb:
        condition: service_healthy          # wait for MariaDB to be ready
      mariadb-init:
        condition: service_completed_successfully  # wait for DB to be created
    environment:
      - ConnectionStrings__DefaultConnection=Server=mariadb;Database=yaf;User=root;Password=MyPass@word; # change default password
      - BoardConfiguration__ConnectionProviderName=MySql.Data.MySqlClient
      - MailConfiguration__Host= # replace with real setting
      - MailConfiguration__Port= # replace with real setting
      - MailConfiguration__Mail=  # replace with real setting
      - ASPNETCORE_URLS=http://+:89
    container_name: yafnet
    ports:
      - "8001:89"
    networks:
      - dev

  mariadb:
    container_name: mariadb
    image: mariadb
    ports:
      - "8002:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=MyPass@word # change default password
      - MARIADB_DATABASE=mysql
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s               # MariaDB starts faster than SQL Server
    networks:
      - dev

  mariadb-init:
    image: mariadb
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      - MARIADB_ROOT_PASSWORD=MyPass@word
    volumes:
      - ./docker/yaf-mysql:/init-db:ro    # mount the init script (read-only)
    entrypoint: /bin/bash /init-db/create-db.sh
    networks:
      - dev
    restart: "no"                           # run once and exit
    
volumes:
  mysql-data:
